<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Pro Ultra</title>
    <style>
        :root {
            --primary: #2ecc71;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --danger: #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--light); color: var(--dark); display: flex; flex-direction: column; h-100vh; overflow: hidden; }
        
        /* Interface com Letras Grandes para Tablets/Celulares */
        header { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 1.3rem; }
        .container { display: flex; flex: 1; overflow: hidden; }
        
        /* Área de Vendas */
        .venda-area { flex: 2; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .carrinho-area { flex: 1.2; background: white; border-left: 2px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        
        /* Inputs Grandes e Responsivos */
        input, select, button { font-size: 1.4rem; padding: 12px; border-radius: 8px; border: 2px solid #ccc; width: 100%; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { filter: brightness(0.9); }
        .btn-danger { background: var(--danger); }
        
        /* Cupom e Resumo */
        .lista-itens { flex: 1; overflow-y: auto; margin: 15px 0; border: 1px solid #eee; padding: 10px; font-family: monospace; font-size: 1.2rem; }
        .total-destaque { font-size: 2.5rem; font-weight: bold; color: var(--dark); text-align: right; margin: 10px 0; }
        
        /* Modais de Configurações e Caixa Opcional */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; text-align: center; }
        
        @media (max-width: 768px) {
            .container { flex-direction: column; overflow-y: auto; }
            .carrinho-area { border-left: none; border-top: 2px solid #ddd; }
        }
    </style>
</head>
<body>

    <header>
        <strong>⚡ PDV PRO</strong>
        <div style="display: flex; gap: 10px;">
            <button onclick="abrirModal('modalConfig')" style="font-size: 1rem; padding: 5px 15px;">⚙️ Configurações</button>
            <button onclick="abrirModal('modalCaixa')" id="btnStatusCaixa" style="font-size: 1rem; padding: 5px 15px; background: #f39c12;">📦 Caixa Livre (Opcional)</button>
        </div>
    </header>

    <div class="container">
        <!-- Entrada de Vendas (Digitada ou por Código) -->
        <div class="venda-area">
            <h2>Nova Venda / Digitação Direta</h2>
            <input type="text" id="buscaProduto" placeholder="Digite o nome do produto ou Código de Barras" list="produtos-sugeridos">
            <datalist id="produtos-sugeridos"></datalist>
            
            <div style="display: flex; gap: 10px;">
                <input type="number" id="qtdProduto" value="1" min="1" style="width: 30%;" placeholder="Qtd">
                <input type="number" id="precoManual" step="0.01" style="width: 70%;" placeholder="Preço Unitário (Opcional)">
            </div>
            
            <button onclick="adicionarItem()">Adicionar ao Cupom (Enter)</button>
            
            <!-- Margem de Lucro em Tempo Real -->
            <div style="background: #e8f8f5; padding: 15px; border-radius: 8px; margin-top: auto; font-size: 1.1rem;">
                <strong>Painel Estatístico Rápido:</strong>
                <div>Margem de Lucro Estimada: <span id="lucroReal" style="color: green; font-weight: bold;">0,00%</span></div>
            </div>
        </div>

        <!-- Carrinho e Impressão -->
        <div class="carrinho-area">
            <h3>Cupom Atual</h3>
            <div class="lista-itens" id="cupomItens">
                <!-- Itens entram aqui -->
            </div>
            <div class="total-destaque">Total: R$ <span id="totalVenda">0,00</span></div>
            
            <div style="display: flex; gap: 10px; margin-top: auto;">
                <button class="btn-danger" onclick="cancelarVenda()">Cancelar</button>
                <button onclick="finalizarVenda(false)">📄 Recibo</button>
                <button onclick="finalizarVenda(true)" style="background: #3498db;">🧾 Cupom Fiscal</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE CAIXA (TOTALMENTE OPCIONAL) -->
    <div id="modalCaixa" class="modal">
        <div class="modal-content">
            <h2>Turno de Caixa</h2>
            <p style="margin: 15px 0; color: #7f8c8d;">A abertura de turno é opcional para controle interno.</p>
            <input type="number" id="saldoInicial" placeholder="Saldo de Troco Inicial (R$)" style="margin-bottom: 15px;">
            <button onclick="definirCaixa(true)">Abrir Turno</button>
            <button class="btn-danger" onclick="definirCaixa(false)" style="margin-top: 10px;">Trabalhar Sem Turno (Modo Livre)</button>
        </div>
    </div>

    <!-- MODAL DE CONFIGURAÇÕES & BACKUP -->
    <div id="modalConfig" class="modal">
        <div class="modal-content">
            <h2>Configurações do Sistema</h2>
            <div style="text-align: left; margin: 15px 0; display:flex; flex-direction:column; gap:10px;">
                <label><strong>Alíquota Imposto Cupom Fiscal (%):</strong></label>
                <input type="number" id="cfgImposto" value="18">
                
                <label><strong>Margem de Lucro Alvo (%):</strong></label>
                <input type="number" id="cfgMargem" value="30">
            </div>
            <button onclick="fazerBackup()" style="background:#34495e; margin-bottom: 10px;">💾 Fazer Backup dos Dados</button>
            <button onclick="fecharModal('modalConfig')">Salvar e Fechar</button>
        </div>
    </div>

    <!-- LÓGICA DO SISTEMA (JAVASCRIPT) -->
    <script>
        let carrinho = [];
        let produtosValores = {}; // Simulação de Banco de dados local para Lucro
        let caixaAberto = true; // Por padrão já inicia livre e funcionando!

        // Abre e fecha modais
        function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
        function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

        function definirCaixa(status) {
            caixaAberto = status;
            const btn = document.getElementById('btnStatusCaixa');
            if(status) {
                btn.innerText = "📦 Caixa Controlado";
                btn.style.background = "#2ecc71";
            } else {
                btn.innerText = "📦 Caixa Livre (Opcional)";
                btn.style.background = "#f39c12";
            }
            fecharModal('modalCaixa');
        }

        // Adicionar produto digitado ou selecionado
        function adicionarItem() {
            const nome = document.getElementById('buscaProduto').value;
            const qtd = parseFloat(document.getElementById('qtdProduto').value);
            let preco = parseFloat(document.getElementById('precoManual').value);

            if (!nome) return alert('Digite o nome ou código do produto!');
            if (!preco) preco = 10.00; // Preço padrão simulado caso não digite

            const item = { nome, qtd, preco, total: qtd * preco, custo: preco * 0.6 }; // Custo fictício de 60% para cálculo de lucro
            carrinho.push(item);
            
            atualizarInterface();
            
            // Limpa campos para a próxima venda
            document.getElementById('buscaProduto').value = '';
            document.getElementById('precoManual').value = '';
        }

        function atualizarInterface() {
            const lista = document.getElementById('cupomItens');
            lista.innerHTML = '';
            let total = 0;
            let custoTotal = 0;

            carrinho.forEach((item, index) => {
                total += item.total;
                custoTotal += (item.custo * item.qtd);
                lista.innerHTML += `<div>${item.qtd}x ${item.nome} -> R$ ${item.total.toFixed(2)}</div>`;
            });

            document.getElementById('totalVenda').innerText = total.toFixed(2);

            // Cálculo profissional da Margem de Lucro Real da Venda
            if (total > 0) {
                let lucroR = ((total - custoTotal) / total) * 100;
                document.getElementById('lucroReal').innerText = lucroR.toFixed(2) + "%";
            } else {
                document.getElementById('lucroReal').innerText = "0,00%";
            }
        }

        function cancelarVenda() {
            carrinho = [];
            atualizarInterface();
        }

        // Sistema de Impressão nativo para Cupom Não-Fiscal e simulação de Fiscal (NFC-e)
        function finalizarVenda(ehFiscal) {
            if (carrinho.length === 0) return alert('Carrinho vazio!');
            
            let dataHora = new Date().toLocaleString('pt-BR');
            let cupomTexto = `
========================================
         EXEMPLO DE PDV PROFISSIONAL    
========================================
DATA: ${dataHora}
TIPO: ${ehFiscal ? 'CUPOM FISCAL (NFC-e)' : 'RECIBO DE VENDA'}
========================================
ITENS:
`;
            carrinho.forEach(item => {
                cupomTexto += `${item.qtd}un x ${item.nome} = R$ ${item.total.toFixed(2)}\n`;
            });

            let total = document.getElementById('totalVenda').innerText;
            cupomTexto += `========================================\nTOTAL: R$ ${total}\n`;
            
            if (ehFiscal) {
                let imposto = document.getElementById('cfgImposto').value;
                cupomTexto += `Tributos Totais (Lei 12.741): R$ ${(total * (imposto/100)).toFixed(2)}\n`;
                cupomTexto += `Chave de Acesso NFC-e:\n0123 4567 8901 2345 6789 0123 4567 8901\n`;
            }
            
            cupomTexto += `\nOBRIGADO PELA PREFERENCIA!\n========================================`;

            // Comando de Impressão Profissional (Abre janela limpa otimizada para impressora térmica de 58mm ou 80mm)
            let janelaImpressao = window.open('', '', 'width=400,height=600');
            janelaImpressao.document.write('<pre style="font-size:14px; font-family:monospace;">' + cupomTexto + '</pre>');
            janelaImpressao.document.close();
            janelaImpressao.print();

            // Salva no histórico local para fins de Backup
            let historico = JSON.parse(localStorage.getItem('historicoVendas') || '[]');
            historico.push({ data: dataHora, itens: carrinho, total: total, fiscal: ehFiscal });
            localStorage.setItem('historicoVendas', JSON.stringify(historico));

            cancelarVenda();
        }

        // Backup de Segurança Completo em JSON para Computador ou Celular
        function fazerBackup() {
            let dados = localStorage.getItem('historicoVendas') || '[]';
            let blob = new Blob([dados], { type: "application/json" });
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = `backup_pdv_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // Atalho de teclado para digitação rápida (Enter insere o produto)
        document.getElementById('buscaProduto').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') adicionarItem();
        });
    </script>
</body>
</html>
